name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同じブランチへの連続 push では古い実行を打ち切る
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: 型検査 / Lint / 整形 / テスト
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: レジストリが最新か確認する
        run: |
          pnpm gen:registry
          git diff --exit-code src/questions/registry.ts \
            || (echo "::error::registry.ts が古くなっています。'pnpm gen:registry' を実行してコミットしてください。" && exit 1)

      - run: pnpm check

  build:
    name: ビルド
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
