version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      # パッチ・マイナーはまとめて 1 本の PR にする
      minor-and-patch:
        update-types:
          - minor
          - patch
      react:
        patterns:
          - react
          - react-dom
          - react-router
          - '@types/react*'
    commit-message:
      prefix: 'deps'
      prefix-development: 'deps-dev'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: 'ci'
